name: clipfeed
description: TikTok-style Twitch clips vertical feed app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Video playback ──────────────────────────────────────────────────────────
  # media_kit gives preload/buffer control across Android, iOS, macOS, Windows, Linux, Web
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4        # native codec bundles (Android + iOS)

  # ── Local storage ───────────────────────────────────────────────────────────
  # Hive for seen-slug deduplication, bookmarks, timestamps, user UUID
  hive_flutter: ^1.1.0

  # ── Anonymous user identity ─────────────────────────────────────────────────
  uuid: ^4.4.0

  # ── State management ────────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── HTTP client ─────────────────────────────────────────────────────────────
  # Wired but not called in mock mode; swap MockClipRepository for
  # HttpClipRepository in main.dart when your backend is ready.
  dio: ^5.7.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  # Assets can be added here, e.g.:
  # assets:
  #   - assets/images/
